<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ .Title }} | {{ .Site.Title }}</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="site-wrapper">
    {{ partial "header.html" . }}
    <main class="site-main">
      {{ block "main" . }}{{ end }}
    </main>
    <footer class="site-footer">
      © {{ now.Year }} {{ .Site.Title }}
    </footer>
  </div>
</body>
</html>
